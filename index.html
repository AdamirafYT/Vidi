<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidi - Otwórz swój Potencjał</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fe2c55; /* TikTok Red */
            --secondary: #25f4ee; /* TikTok Cyan */
            --dark: #121212;
            --light: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Tło z delikatnym gradientem */
        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            top: 10%; left: 10%;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 30px;
        }

        .status-box {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tagline">Vidi</div>
        <h1>Otwórz swój Potencjał</h1>
        
        <p>
            Vidi to inteligentne narzędzie do zarządzania Twoim contentem na TikToku. 
            Automatyzuj, analizuj i rozwijaj swój profil szybciej niż kiedykolwiek.
        </p>

        <div class="status-box" id="auth-status">
            <div class="spinner"></div>
            <span id="status-text">Oczekiwanie na autoryzację...</span>
        </div>

        <div class="footer">
            &copy; 2026 Vidi Project. Wszystkie prawa zastrzeżone.
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Sprawdzamy, czy w adresie jest kod od TikToka
        if (urlParams.has('code')) {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "Łączenie z aplikacją Vidi...";

            const localAppUrl = `http://127.0.0.1:8723/oauth/callback?${urlParams.toString()}`;

            // Próba wysłania danych do aplikacji lokalnej
            fetch(localAppUrl, { mode: 'no-cors' })
                .then(() => {
                    statusText.innerText = "Zalogowano pomyślnie! Możesz wrócić do aplikacji.";
                    document.querySelector('.spinner').style.display = 'none';
                    document.getElementById('auth-status').style.background = "rgba(37, 244, 238, 0.1)";
                })
                .catch(() => {
                    // Jeśli fetch zawiedzie, spróbuj klasycznego przekierowania
                    window.location.href = localAppUrl;
                });
        } else {
            // Jeśli ktoś wejdzie na stronę bez kodu (np. wpisując adres ręcznie)
            document.getElementById('auth-status').innerHTML = "Gotowy do działania. Uruchom Vidi na swoim komputerze.";
        }
    </script>
</body>
</html>
